<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Halaman Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
    }

    .login-box{
      width:350px;
      background:#fff;
      padding:40px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      color:#555;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#4f46e5;
      box-shadow:0 0 5px rgba(79,70,229,0.5);
    }

    .btn-login{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#4f46e5;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn-login:hover{
      background:#4338ca;
    }

    .register{
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    .register a{
      color:#4f46e5;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>LOGIN PPDB SEKOLAH</h2>

    <form>
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Masukkan email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Masukkan password" required>
      </div>

      <button type="submit" class="btn-login">Masuk</button>
    </form>

    <div class="register">
      Belum punya akun? <a href="#">Daftar</a>
    </div>
  </div>

</body>
</html>
