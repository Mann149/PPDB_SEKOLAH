<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Siswa Baru 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-3xl mx-auto my-10 bg-white p-8 rounded-xl shadow-lg">
        <!-- Header -->
        <div class="border-b-2 border-blue-500 pb-4 mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Formulir Pendaftaran Siswa</h1>
            <p class="text-gray-500">Tahun Ajaran 2026/2027</p>
        </div>

        <form action="#" method="POST" class="space-y-6">
            
            <!-- Bagian 1: Data Pribadi -->
            <section>
                <h2 class="text-xl font-semibold text-blue-600 mb-4 flex items-center">
                    <span class="bg-blue-100 p-2 rounded-full mr-2">👤</span> Data Pribadi Siswa
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                        <input type="text" name="nama" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Masukkan nama sesuai ijazah" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tempat Lahir</label>
                        <input type="text" name="tempat_lahir" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tanggal Lahir</label>
                        <input type="date" name="tgl_lahir" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Jenis Kelamin</label>
                        <select name="jk" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">NISN</label>
                        <input type="number" name="nisn" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="10 digit angka">
                    </div>
                </div>
            </section>

            <hr>

            <!-- Bagian 2: Data Kontak & Orang Tua -->
            <section>
                <h2 class="text-xl font-semibold text-blue-600 mb-4 flex items-center">
                    <span class="bg-blue-100 p-2 rounded-full mr-2">🏠</span> Data Kontak & Orang Tua
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Alamat Lengkap</label>
                        <textarea name="alamat" rows="3" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Jl. Nama Jalan, No, RT/RW..."></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nama Ayah/Wali</label>
                            <input type="text" name="nama_ayah" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">No. WhatsApp Aktif</label>
                            <input type="tel" name="wa" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="08xxxxxxx">
                        </div>
                    </div>
                </div>
            </section>

            <hr>

            <!-- Bagian 3: Unggah Dokumen -->
            <section>
                <h2 class="text-xl font-semibold text-blue-600 mb-4 flex items-center">
                    <span class="bg-blue-100 p-2 rounded-full mr-2">📂</span> Dokumen Pendukung
                </h2>
                <div class="bg-gray-50 p-4 rounded-lg border border-dashed border-gray-400">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload Pas Foto (Format JPG/PNG, Maks 2MB)</label>
                    <input type="file" name="foto" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>
            </section>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all transform hover:scale-[1.01] active:scale-95">
                    Kirim Pendaftaran Sekarang
                </button>
                <p class="text-center text-xs text-gray-400 mt-4 italic">
                    * Pastikan data yang anda masukkan sudah benar sebelum menekan tombol kirim.
                </p>
            </div>

        </form>
    </div>

</body>
</html>
